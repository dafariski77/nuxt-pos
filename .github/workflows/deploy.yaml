name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            cd /root/personal-project/gravity-pos
            
            # Pull repository configuration changes
            git pull origin main
            
            # Login to GHCR on the VM to allow pulling private packages (if the repo is private)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            export DOCKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            
            # Pull the pre-built image
            docker compose pull
            
            # Restart the container with the new image (minimal downtime)
            docker compose up -d
            
            # Cleanup old unused images to save disk space
            docker image prune -af
          EOF

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="🟢🔥"
          elif [ "$STATUS" = "failure" ]; then
            EMOJI="🔴💀"
          else
            EMOJI="🟡⚠️"
          fi

          cat <<EOF > discord_payload.json
          {
            "username": "ambaruwo",
            "avatar_url": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS6FHnklITTlC9P8OrD8el6U48ScrvaQUvZBg&s",
            "content": "🚀 **PROD DEPLOYMENT FINISHED**\nRepo: \`${{ github.repository }}\`\nBranch: \`main\`\nStatus: $EMOJI **$STATUS**"
          }
          EOF

          curl -H "Content-Type: application/json" \
               -d @discord_payload.json \
               ${{ secrets.DISCORD_WEBHOOK_URL }}